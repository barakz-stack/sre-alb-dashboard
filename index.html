function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

function delta(cur, prev) {
  if (!prev || prev === 0) return '';
  const pct = ((cur - prev) / prev * 100);
  const sign = pct >= 0 ? '+' : '';
  const cls = pct > 1 ? 'delta-up' : pct < -1 ? 'delta-down' : 'delta-neutral';
  return `<span class="kpi-delta ${cls}">${sign}${pct.toFixed(1)}% vs prev</span>`;
}

const FILTERS = [
  { key: 'payments_creation_public', label: 'Payments Created (Public)', color: 'blue' },
  { key: 'all_posts_public_proxy',   label: 'All POSTs — Public Proxy', color: 'amber' },
  { key: 'posts_internal_proxy',     label: 'POSTs — Internal Proxy',   color: 'purple' },
  { key: 'all_internal_proxy',       label: 'All — Internal Proxy',     color: 'green' },
  { key: 'three_ds',                 label: '3DS Authentication',       color: 'crimson' },
];
const CHART_COLORS = { blue:'#2563eb', amber:'#d97706', purple:'#7c3aed', green:'#16a34a', crimson:'#e11d48' };

// Build trend chart
const labels = DAYS.map(d => d.date).reverse();
const datasets = FILTERS.map(f => ({
  label: f.label,
  data: DAYS.map(d => d.filters[f.key].total).reverse(),
  borderColor: CHART_COLORS[f.color],
  backgroundColor: CHART_COLORS[f.color] + '18',
  tension: 0.3,
  pointRadius: 3,
  fill: false,
}));

new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: { labels, datasets },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
    scales: {
      y: { ticks: { callback: v => fmt(v), font: { size: 11 } }, grid: { color: '#f1f5f9' } },
      x: { ticks: { font: { size: 11 } }, grid: { display: false } }
    }
  }
});

// Day tabs
let currentDay = 0;
const tabs = document.getElementById('dayTabs');
DAYS.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'day-tab' + (i === 0 ? ' active' : '');
  btn.textContent = d.date;
  btn.onclick = () => { currentDay = i; renderDay(); document.querySelectorAll('.day-tab').forEach((t,j) => t.classList.toggle('active', j===i)); };
  tabs.appendChild(btn);
});

function renderDay() {
  const day = DAYS[currentDay];
  const prev = DAYS[currentDay + 1];
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = FILTERS.map(f => {
    const cur = day.filters[f.key].total;
    const pv = prev ? prev.filters[f.key].total : 0;
    return `<div class="kpi-card ${f.color}">
      <div class="kpi-label">${f.label}</div>
      <div class="kpi-value">${fmt(cur)}</div>
      ${delta(cur, pv)}
    </div>`;
  }).join('');

  // Top requests table per filter
  const tr = document.getElementById('topRequests');
  tr.innerHTML = FILTERS.map(f => {
    const rows = (day.filters[f.key].by_request || []).slice(0, 5);
    if (!rows.length) return '';
    return `<details open style="margin-bottom:12px">
      <summary style="cursor:pointer;font-size:13px;font-weight:600;color:#374151;padding:4px 0">${f.label} — top requests</summary>
      <table class="top-requests" style="margin-top:6px">
        <tr><th>Request</th><th style="text-align:right;white-space:nowrap">Count</th></tr>
        ${rows.map(r => `<tr><td>${r.key}</td><td style="text-align:right;white-space:nowrap">${r.count.toLocaleString()}</td></tr>`).join('')}
      </table>
    </details>`;
  }).join('');
}

renderDay();
