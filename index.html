<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALB Traffic Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6fa;color:#1e293b}
.header{background:#1e293b;color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.4rem;font-weight:600}
.header .sub{font-size:.85rem;color:#94a3b8;margin-top:4px}
.container{max-width:1200px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:24px;margin-bottom:24px}
.trend-title{font-size:1rem;font-weight:600;margin-bottom:16px;color:#374151}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tab{padding:8px 16px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.85rem;font-weight:500;color:#64748b;transition:all .15s}
.tab.active{background:#1e293b;color:#fff;border-color:#1e293b}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:#f8fafc;border-radius:10px;padding:16px}
.kpi .label{font-size:.75rem;color:#64748b;margin-bottom:6px;font-weight:500}
.kpi .value{font-size:1.6rem;font-weight:700}
.kpi .delta{font-size:.8rem;margin-top:4px;font-weight:500}
.delta.up{color:#16a34a}.delta.down{color:#e11d48}.delta.flat{color:#64748b}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:10px 12px;background:#f1f5f9;color:#64748b;font-weight:600;border-bottom:2px solid #e2e8f0}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9}
tr:last-child td{border-bottom:none}
.day-panel{display:none}.day-panel.active{display:block}
.section-title{font-size:.9rem;font-weight:600;color:#374151;margin-bottom:12px}
</style>
</head>
<body>

</div>

const FILTER_NAMES = {"payments_creation_public": "Payments creation (public)", "all_posts_public_proxy": "All POSTs \u2014 public proxy", "posts_internal_proxy": "POSTs \u2014 internal proxy", "all_internal_proxy": "All requests \u2014 internal proxy", "three_ds": "3DS authentication"};
const COLORS = {"payments_creation_public": "#2563eb", "all_posts_public_proxy": "#d97706", "posts_internal_proxy": "#7c3aed", "all_internal_proxy": "#16a34a", "three_ds": "#e11d48"};
const FILTER_KEYS = ["payments_creation_public", "all_posts_public_proxy", "posts_internal_proxy", "all_internal_proxy", "three_ds"];

function fmt(n){return n==null?'—':n.toLocaleString()}
function delta(cur,prev){
  if(!prev||prev===0) return '<span class="delta flat">—</span>';
  const pct=((cur-prev)/prev*100).toFixed(1);
  const cls=pct>0?'up':pct<0?'down':'flat';
  const sign=pct>0?'+':'';
  return `<span class="delta ${cls}">${sign}${pct}%</span>`;
}

// Build trend chart
const labels = DAYS.slice(0,14).map(d=>d.date).reverse();
const datasets = FILTER_KEYS.map(k=>({
  label: FILTER_NAMES[k],
  data: DAYS.slice(0,14).map(d=>d.filters[k]?.total||0).reverse(),
  borderColor: COLORS[k],
  backgroundColor: COLORS[k]+'22',
  tension:.3,pointRadius:3,borderWidth:2,fill:false
}));
new Chart(document.getElementById('trendChart'),{
  type:'line',
  data:{labels,datasets},
  options:{responsive:true,interaction:{mode:'index',intersect:false},
    plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},
    scales:{y:{ticks:{callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v}}}
  }
});

// Build tabs & panels
const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');
DAYS.forEach((day,i)=>{
  const tab = document.createElement('button');
  tab.className='tab'+(i===0?' active':'');
  tab.textContent=day.date;
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+i).classList.add('active');
  };
  tabsEl.appendChild(tab);

  const prev = DAYS[i+1];
  const panel = document.createElement('div');
  panel.className='day-panel card'+(i===0?' active':'');
  panel.id='panel-'+i;

  let kpis='';
  FILTER_KEYS.forEach(k=>{
    const cur=day.filters[k]?.total||0;
    const prv=prev?.filters[k]?.total||0;
    kpis+=`<div class="kpi" style="border-left:4px solid ${COLORS[k]}">
      <div class="label">${FILTER_NAMES[k]}</div>
      <div class="value" style="color:${COLORS[k]}">${fmt(cur)}</div>
      ${delta(cur,prv)}
    </div>`;
  });

  let tables='';
  FILTER_KEYS.forEach(k=>{
    const buckets=(day.filters[k]?.by_request||[]).slice(0,5);
    if(!buckets.length) return;
    let rows=buckets.map(b=>`<tr><td style="word-break:break-all">${b.key}</td><td style="text-align:right">${fmt(b.count)}</td></tr>`).join('');
    tables+=`<div style="margin-bottom:20px">
      <div class="section-title" style="color:${COLORS[k]}">${FILTER_NAMES[k]}</div>
      <table><thead><tr><th>Endpoint</th><th style="text-align:right">Hits</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  });

  panel.innerHTML=`<div class="kpi-grid">${kpis}</div>${tables}`;
  panelsEl.appendChild(panel);
});
</script>
