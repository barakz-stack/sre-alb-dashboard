function sd(s){const[y,m,d]=s.split('-');return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function ld(s){const[y,m,d]=s.split('-');return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}
function badge(cur,prev){
  if(prev==null||prev===0)return'';
  const d=cur-prev,p=d/prev*100;
  if(Math.abs(p)<0.05)return'<span class="delta flat">= 0%</span>';
  const c=d>0?'up':'dn',a=d>0?'▲':'▼';
  return`<span class="delta ${c}">${a} ${Math.abs(p).toFixed(1)}%</span>`;
}
const tDays=[...DAYS].reverse();
new Chart(document.getElementById('trendChart'),{
  type:'line',
  data:{labels:tDays.map(d=>sd(d.date)),datasets:FILTERS.map(f=>({
    label:f.title,data:tDays.map(d=>d.filters[f.id]?.total||0),
    borderColor:COLOR[f.color],backgroundColor:'transparent',
    borderWidth:2,pointRadius:3,pointHoverRadius:5,tension:0.3
  }))},
  options:{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{position:'bottom',labels:{color:'#64748b',boxWidth:12,padding:14,font:{size:11}}},
      tooltip:{backgroundColor:'#fff',borderColor:'#e2e8f0',borderWidth:1,titleColor:'#0f172a',bodyColor:'#64748b',
        callbacks:{label:c=>`  ${c.dataset.label}: ${(c.parsed.y||0).toLocaleString()}`}}
    },
    scales:{
      x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#f1f5f9'}},
      y:{ticks:{color:'#94a3b8',font:{size:11},callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v},grid:{color:'#f1f5f9'}}
    }}
});
const tabsEl=document.getElementById('tabs'),panelsEl=document.getElementById('panels');
DAYS.forEach((day,idx)=>{
  const prev=DAYS[idx+1]||null;
  const tab=document.createElement('button');
  tab.className='tab'+(idx===0?' active':'');
  tab.dataset.target='day-'+day.date;
  tab.textContent=sd(day.date);
  tabsEl.appendChild(tab);
  const kpis=FILTERS.map(f=>{
    const cur=day.filters[f.id]?.total||0,prv=prev?.filters[f.id]?.total??null;
    return`<div class="kpi kpi-${f.color}"><div class="kpi-label">${f.title}</div>
      <div class="kpi-value">${fmtS(cur)}</div>${badge(cur,prv)}</div>`;
  }).join('');
  const cards=FILTERS.map(f=>{
    const fd=day.filters[f.id];if(!fd)return'';
    const prv=prev?.filters[f.id]?.total??null;
    const rows=fd.by_request.map(r=>{
      const p=fd.total>0?(r.count/fd.total*100).toFixed(1):'0.0';
      return`<tr><td class="key">${r.key}</td><td class="num">${fmt(r.count)}</td><td class="pct">${p}%</td></tr>`;
    }).join('');
    return`<div class="filter filter-${f.color}${f.wide?' wide':''}">
      <h3>${f.title}</h3><p class="subtitle">${f.subtitle}</p>
      <p class="total">${fmt(fd.total)}<span class="total-sfx">requests</span> ${badge(fd.total,prv)}</p>
      <h4 class="th">Top endpoints</h4>
      <table><thead><tr><th>endpoint</th><th>count</th><th>share</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }).join('');
  const panel=document.createElement('div');
  panel.className='day-panel'+(idx===0?' active':'');
  panel.id='day-'+day.date;
  panel.innerHTML=`<div class="day-header"><h2>${ld(day.date)}</h2></div>
    <p class="day-meta">prod-sbox-alb-index-* &nbsp;·&nbsp; UTC 00:00–24:00</p>
    <div class="kpi-row">${kpis}</div><div class="filters-grid">${cards}</div>`;
  panelsEl.appendChild(panel);
});
tabsEl.addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.day-panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById(t.dataset.target)?.classList.add('active');
});
</script></body></html>
